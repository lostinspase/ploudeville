# Global deployment settings for Ploudeville.
app_name: ploudeville
app_user: ploudeville
app_group: ploudeville
app_root: /opt/ploudeville
app_source_dir: "{{ app_root }}/app"
app_venv_dir: "{{ app_root }}/venv"
app_repo_url: "https://github.com/lostinspase/ploudeville.git"
app_repo_version: main
# Optional local SQLite file path on the Ansible controller for first deploy migration.
app_db_seed_local_path: ""

app_bind_host: 127.0.0.1
app_port: 18000

# DNS hostnames served by Nginx.
public_domain: www.ploudeville.com
public_domain_aliases:
  - ploudeville.com
  - "*.ploudeville.com"

# Systemd and reverse proxy settings.
systemd_unit_name: "{{ app_name }}.service"
nginx_site_name: "{{ app_name }}.conf"
nginx_enable_default_site: false

# Local network DNS served by bind9 on the Raspberry Pi.
dns_bind_service_name: named
dns_server_ipv4: "{{ ansible_host }}"
dns_zone_name: ploudeville.com
dns_zone_ttl: 300
dns_allow_query:
  - localhost
  - localnets
dns_allow_recursion:
  - localhost
  - localnets
dns_listen_ipv4:
  - 127.0.0.1
  - "{{ dns_server_ipv4 }}"
dns_forwarders:
  - 1.1.1.1
  - 1.0.0.1
dns_zone_apex_records:
  - "{{ dns_server_ipv4 }}"
dns_zone_www_records:
  - "{{ dns_server_ipv4 }}"
dns_zone_wildcard_records:
  - "{{ dns_server_ipv4 }}"

# Mandatory app secret used for cookie signing.
family_web_secret: "{{ vault_family_web_secret }}"

# Optional environment variables consumed by src.family_system.web
app_env:
  FAMILY_WEB_SECRET: "{{ family_web_secret }}"
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_USER: ""
  SMTP_PASS: ""
  SMTP_FROM: ""
  APEIRON_SMS_USER: ""
  APEIRON_SMS_TOKEN: ""
  APEIRON_API_KEY: ""
  APEIRON_SMS_FROM: ""
  APEIRON_SMS_ENDPOINT: ""
  TICKETMASTER_API_KEY: ""
  IOS_SYNC_TOKEN: ""
  READING_CHATBOT_API_URL: ""
  READING_CHATBOT_API_KEY: ""
  GROQ_API_KEY: ""
  GROQ_MODEL: "llama-3.1-8b-instant"
  GROQ_API_URL: "https://api.groq.com/openai/v1/chat/completions"
