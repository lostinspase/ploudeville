---
- name: Assert required DNS variables
  ansible.builtin.assert:
    that:
      - dns_zone_name | default("") | length > 0
      - dns_server_ipv4 | default("") | length > 0
      - dns_forwarders | default([]) | length > 0
      - dns_zone_apex_records | default([]) | length > 0
      - dns_zone_www_records | default([]) | length > 0
    fail_msg: "Set dns_zone_name, dns_server_ipv4, dns_forwarders, and the zone record lists in group_vars/all.yml"

- name: Install bind9 packages
  ansible.builtin.apt:
    name:
      - bind9
      - bind9-utils
      - dnsutils
    update_cache: true
    state: present

- name: Render bind9 options config
  ansible.builtin.template:
    src: named.conf.options.j2
    dest: /etc/bind/named.conf.options
    owner: root
    group: bind
    mode: "0644"
  notify: Restart bind9

- name: Render bind9 local zone config
  ansible.builtin.template:
    src: named.conf.local.j2
    dest: /etc/bind/named.conf.local
    owner: root
    group: bind
    mode: "0644"
  notify: Restart bind9

- name: Render bind9 zone file
  ansible.builtin.template:
    src: db.zone.j2
    dest: "/etc/bind/db.{{ dns_zone_name }}"
    owner: root
    group: bind
    mode: "0644"
  notify: Restart bind9

- name: Ensure bind9 service is enabled and running
  ansible.builtin.systemd:
    name: "{{ dns_bind_service_name }}"
    enabled: true
    state: started
